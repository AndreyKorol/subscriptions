services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscriptions-app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: ${DB_SSLMODE}
      APP_ENV: ${APP_ENV}
      APP_PORT: ${APP_PORT}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - subscriptions-network

  migrate:
    image: migrate/migrate:latest
    command: [
      "-path", "/migrations",
      "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}?sslmode=${DB_SSLMODE}",
      "up"
    ]
    volumes:
      - ./internal/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - subscriptions-network

  postgres:
    image: postgres:latest
    container_name: subscriptions-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - subscriptions-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - subscriptions-network

networks:
  subscriptions-network:

volumes:
  subscriptions-data:
